<inm-pattern-dialog-shell
  windowTitle="dgMP"
  brand=""
  [patient]="patient">

  <span chrome-title-after class="chrome-tab">eMP v3</span>

  <div meta-trailing class="patient-trailing">
    <inm-button variant="text" size="m" iconLeft="printer">Drucken</inm-button>
    <inm-button variant="text" size="m" iconLeft="file-pdf">PDF runterladen</inm-button>
    <button type="button" class="alt-legend"
      (click)="altHints.toggleSticky()">
      <inm-hotkey [keys]="['Alt']" action="halten für Tastenkürzel" [alwaysVisible]="true" />
    </button>
    <a href="#" class="online-hilfe-link" (click)="$event.preventDefault()">
      <i class="ph ph-question"></i> Online Hilfe
    </a>
  </div>

  <inm-pattern-title-band
    title="Elektronischer Medikationsplan - eMP"
    searchPlaceholder="Wirkstoff, Handelsname"
    searchHotkey="Alt+S"
    [search]="planSearch()"
    (searchChange)="planSearch.set($event)">
    <span actions class="title-band-actions">
      <inm-button variant="akzent" size="m" iconLeft="plus" hotkey="Alt+1"
        (click)="openAbdata(true)">
        Neuer Eintrag (mit Rezept)
      </inm-button>
      <inm-button variant="akzent" size="m" iconLeft="plus" hotkey="Alt+2"
        (click)="openAbdata(false)">
        Neuer Eintrag (ohne Rezept)
      </inm-button>
    </span>
  </inm-pattern-title-band>

  <as-split direction="vertical" gutterSize="6" unit="percent" class="content-area">
    <as-split-area [size]="60" [minSize]="20">
      <emp-plan-table
        [aktive]="aktive"
        [pausiert]="pausiert"
        [geplant]="geplant"
        [search]="planSearch()"
        [expanded]="expandedRows()"
        [collapsed]="collapsedGroups()"
        (rowClick)="openMedDetail($event.med, $event.event)"
        (rowExpand)="toggleRow($event)"
        (rowMenu)="openRowMenu($event.med, $event.event)"
        (groupToggle)="toggleGroup($event)"
        (dosageEdit)="openBearbeitenForDosage($event)" />
    </as-split-area>

    <as-split-area [size]="40" [minSize]="15">
      <emp-sources-panel
        [emlRows]="emlRows"
        [kkRows]="kkRows"
        [plans]="plans"
        [search]="planSearch()"
        [hideUsed]="hideUsedSrc()"
        (hideUsedChange)="hideUsedSrc.set($event)"
        (emlRowClick)="openEmlDetail($event)"
        (emlImport)="openBearbeitenFromEml($event.row)"
        (emlMenu)="openSrcRowMenu('eml', $event)"
        (kkRowClick)="openKkDetail($event)"
        (kkImport)="openBearbeitenFromKk($event)"
        (kkMenu)="openSrcRowMenu('kk', $event)"
        (planClick)="openPastPlan($event)" />
    </as-split-area>
  </as-split>

  <inm-button footer-actions variant="primary" size="l" iconLeft="check">
    Medikationsplan aktualisieren
    @if (changedCount() > 0) {
      <span class="aktualisieren-count">{{ changedCount() }}</span>
    }
  </inm-button>

</inm-pattern-dialog-shell>

<!-- ══════════════════════════════════════════════════════
     CONTEXT MENU OVERLAY
     ══════════════════════════════════════════════════════ -->
@if (ctxMenu()) {
  <div class="ctx-backdrop" (click)="ctxMenu.set(null)"></div>
  <div class="ctx-positioned"
    [style.left.px]="ctxMenu()!.x"
    [style.top.px]="ctxMenu()!.y">
    <inm-context-menu
      [items]="rowMenuItems"
      (itemClick)="onRowMenuAction($event.label)" />
  </div>
}

<!-- ══════════════════════════════════════════════════════
     MED DETAIL MODAL
     ══════════════════════════════════════════════════════ -->
<emp-med-detail-modal
  [med]="medDetailMed()"
  [open]="medDetailOpen()"
  (bearbeiten)="openBearbeiten($event)"
  (austausch)="onBearbeitenAustausch($event)"
  (pausieren)="onBearbeitenPausieren($event)"
  (beenden)="onBearbeitenBeenden($event)"
  (closed)="medDetailOpen.set(false)" />

<!-- ══════════════════════════════════════════════════════
     BEARBEITEN MODAL
     ══════════════════════════════════════════════════════ -->
<emp-bearbeiten-modal
  [med]="bearbeitenMed()"
  [open]="bearbeitenOpen()"
  [patient]="patient"
  (closed)="onBearbeitenClosed()"
  (pausieren)="onBearbeitenPausieren($event)"
  (beenden)="onBearbeitenBeenden($event)"
  (austausch)="onBearbeitenAustausch($event)" />

<!-- ══════════════════════════════════════════════════════
     eML IMPORT MODAL
     ══════════════════════════════════════════════════════ -->
<emp-eml-import-modal
  [row]="emlRow()"
  [open]="!!emlRow()"
  [grundSuggestions]="grundSuggestions"
  (submitted)="submitEmlImport($event)"
  (closed)="emlRow.set(null)" />

<!-- ══════════════════════════════════════════════════════
     CONFIRM MODAL
     ══════════════════════════════════════════════════════ -->
<emp-confirm-modal
  [options]="confirm()"
  [open]="!!confirm()"
  (closed)="closeConfirm()" />

<!-- ══════════════════════════════════════════════════════
     ABDATA — Medikamentensuche
     ══════════════════════════════════════════════════════ -->
<emp-abdata-modal
  [open]="abdataOpen()"
  [withRezept]="abdataWithRezept()"
  [query]="abdataSearch()"
  (queryChange)="abdataSearch.set($event)"
  (selected)="abdataOpen.set(false)"
  (closed)="abdataOpen.set(false)" />

<!-- ══════════════════════════════════════════════════════
     eML — Detailansicht (Verordnung + Dispensierung)
     ══════════════════════════════════════════════════════ -->
<emp-eml-detail-modal
  [row]="emlDetailRow()"
  [open]="emlDetailOpen()"
  [patient]="patient"
  (editAndAdopt)="openBearbeitenFromEml($event)"
  (closed)="emlDetailOpen.set(false)" />

<!-- ══════════════════════════════════════════════════════
     Karteikarte — Quelldaten-Detail
     ══════════════════════════════════════════════════════ -->
<emp-karteikarte-detail-modal
  [row]="srcDetailRow()"
  [open]="srcDetailOpen()"
  (editAndAdopt)="openBearbeitenFromKk($event)"
  (closed)="srcDetailOpen.set(false)" />

<!-- ══════════════════════════════════════════════════════
     Vergangener Plan — Übersicht (full data table modal)
     ══════════════════════════════════════════════════════ -->
<emp-past-plan-modal
  [plan]="pastPlanRow()"
  [open]="pastPlanOpen()"
  [patient]="patient"
  [activeWirkstoffe]="aktiveWirkstoffe()"
  [search]="planSearch()"
  (closed)="pastPlanOpen.set(false)"
  (editAndAdopt)="onPastPlanAdopt($event)" />

<!-- ══════════════════════════════════════════════════════
     SOURCE-ROW CONTEXT MENU (eML / Karteikarte ⋮)
     ══════════════════════════════════════════════════════ -->
@if (srcCtxMenu()) {
  <div class="ctx-backdrop" (click)="srcCtxMenu.set(null)"></div>
  <div class="ctx-positioned"
    [style.left.px]="srcCtxMenu()!.x"
    [style.top.px]="srcCtxMenu()!.y">
    <inm-context-menu
      [items]="srcRowMenuItems"
      (itemClick)="onSrcRowMenuAction($event.label)" />
  </div>
}
